<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Build beautiful weekly schedules with drag-and-drop, export to PDF/PNG, and sync across devices." />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#F8F6F3" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0B0E1C" />
    <title>Schedule Maker</title>

    <!-- Prevent FOUC: always resolve and apply a theme class before first
         paint (saved choice from the settings store, else system preference).
         The Heritage tokens rely on this — there are no
         prefers-color-scheme CSS fallbacks. -->
    <script>
      (function () {
        var dark = null;
        try {
          var raw = localStorage.getItem('schedule-maker-settings');
          if (raw) {
            var state = JSON.parse(raw).state;
            if (state && state.themeExplicit === true) dark = !!state.darkMode;
          }
        } catch (e) {}
        if (dark === null) {
          dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        }
        document.documentElement.classList.add(dark ? 'dark' : 'light');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
